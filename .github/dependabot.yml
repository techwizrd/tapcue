version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: "UTC"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - ci
    groups:
      gha-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      gha-major:
        patterns:
          - "*"
        update-types:
          - major

# Intentionally omitted: npm/pip ecosystems under tests/runner-fixtures/**.
# Those fixture dependency trees are test data and are excluded to reduce maintenance churn.
