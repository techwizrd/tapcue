repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo fmt --all --check
        language: system
        pass_filenames: false

      - id: cargo-check
        name: cargo check --locked
        entry: cargo check --all-targets --all-features --locked
        language: system
        pass_filenames: false

      - id: cargo-clippy-manual
        name: cargo clippy (manual)
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        pass_filenames: false
        stages: [manual]

      - id: cargo-test-manual
        name: cargo test (manual)
        entry: cargo test --all-features --locked
        language: system
        pass_filenames: false
        stages: [manual]

      - id: cargo-doc-manual
        name: cargo doc (manual)
        entry: cargo doc --no-deps --locked
        language: system
        pass_filenames: false
        stages: [manual]
