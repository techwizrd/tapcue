#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-merge-conflict" },
  { id = "check-added-large-files" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "cargo-fmt", name = "cargo fmt --check", entry = "cargo fmt --all --check", language = "system", pass_filenames = false },
  { id = "cargo-check", name = "cargo check --locked", entry = "cargo check --all-targets --all-features --locked", language = "system", pass_filenames = false },
  { id = "cargo-clippy", name = "cargo clippy", entry = "cargo clippy --all-targets --all-features -- -D warnings", language = "system", pass_filenames = false },
  { id = "cargo-test", name = "cargo test", entry = "cargo test --all-features --locked", language = "system", pass_filenames = false },
  { id = "cargo-doc", name = "cargo doc", entry = "cargo doc --no-deps --locked", language = "system", pass_filenames = false },
]
